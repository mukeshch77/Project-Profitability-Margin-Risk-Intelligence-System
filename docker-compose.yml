services:
  database:
    image: postgres:15
    container_name: project-risk-database
    environment:
      POSTGRES_DB: project_risk_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_risk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: project-risk-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/project_risk_db
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: project-risk-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
